code: ds_ld_ip_s_pre2017
name: "Доп. соглашение к ЛД"
file: "FM_DS_IP_c_2017.docx"

ui:
  menu_title: "ФМ-ДС-ИП с 2017"
  description: "Формирование доп. соглашения к лицензионному договору с ИП."
  category: "ФорМакс"
  subcategory: "Доп. соглашения"
# Эти поля присутствуют в шаблоне как теги, но пользователя по ним не спрашиваем
# (они вычисляются из других значений)
skip_fields:


# Инлайн-значения по умолчанию для отдельных полей (показываются кнопками)
field_defaults:
  contract:
    dov_num:
      - "232-01/2026-АД"
    dov_date:
      - "14.01.2026"

sections:
  - id: contract
    title: "Шапка соглашения"
    fields:
      - name: add_num
        label: "Номер дополнительного соглашения"
        type: text
        required: true
        word_tag: "{{ADD_NUM}}"

      - name: ld_num
        label: "Номер лицензионного договора"
        type: text
        required: true
        word_tag: "{{LD_NUM}}"

      - name: ld_day
        label: "Дата лицензионного договора (формат 01.01.2025)"
        type: date
        required: true
        date_handler: split_ru_genitive
        word_tags:
          day: "{{LD_DAY}}"
          month: "{{LD_MONTH}}"
          year: "{{LD_YEAR}}"

      - name: day
        label: "Дата документа (формат 01.01.2025)"
        type: date
        required: true
        date_handler: split_ru_genitive
        word_tags:
          day: "{{DAY}}"
          month: "{{MONTH}}"
          year: "{{YEAR}}"

      - name: dov_num
        label: "Номер доверенности"
        type: text
        required: true
        word_tag: "{{DOV_NUM}}"

      - name: dov_date
        label: "Дата доверенности (формат 01.01.2025)"
        type: date
        required: true
        date_handler: raw
        word_tag: "{{DOV_DATE}}"

      - name: ip_fio
        label: "ФИО индивидуального предпринимателя (полностью)"
        type: text
        required: true
        text_handler: fio_full_and_initials
        word_tags:
          full: "{{IP_FIO}}"
          initials: "{{FIO_SHORT}}"

      - name: ip_date
        label: "Лист записи ЕГРИП от (формат 01.01.2025)"
        type: date
        required: true
        date_handler: raw
        word_tag: "{{IP_DATE}}"

  - id: objects
    title: "Содержание лицензионного пакета (объекты)"
    type: table
    table:
      anchor_type: "tag"
      anchor_value: "{{OBJ_NAME}}"
      row_template: 2
      allow_dynamic_rows: true
      min_rows: 1
      max_rows: 50

      columns:
        - name: category
          label: "Категория объекта"
          type: text
          word_tag: "{{OBJ_CATEGORY}}"
          normalizer: "category_code"

        - name: name
          label: "Наименование Объекта"
          type: text
          word_tag: "{{OBJ_NAME}}"

        - name: address
          label: "Адрес Объекта"
          type: text
          word_tag: "{{OBJ_ADDRESS}}"

        - name: area
          label: "Площадь Объекта"
          type: number
          word_tag: "{{OBJ_AREA}}"
          normalizer: "area_m2"

        - name: tariff
          label: "Тариф"
          type: text
          word_tag: "{{OBJ_TARIFF}}"

        - name: start_date
          label: "Дата начала действия"
          type: date
          word_tag: "{{OBJ_START_DATE}}"
          output_format: "ru_date"

        - name: payment_terms
          label: "Порядок оплаты"
          type: text
          word_tag: "{{OBJ_PAYMENT_TERMS}}"

        - name: period_fee
          label: "Лицензионное вознаграждение"
          type: number
          word_tag: "{{OBJ_PERIOD_FEE}}"

  - id: totals
    title: "Итоговая сумма по соглашению"
    fields:
      - name: total_sum_num
        label: "Итоговая сумма, руб (цифрами)"
        type: number
        required: true
        word_tag: "{{TOTAL_SUM_NUM}}"

      - name: total_sum_words
        label: "Итоговая сумма, руб (прописью)"
        type: text
        required: true
        word_tag: "{{TOTAL_SUM_WORDS}}"

      - name: total_kop
        label: "Итоговая сумма, копейки (цифрами)"
        type: number
        required: true
        word_tag: "{{TOTAL_KOP}}"

  - id: licensee_footer
    title: "Реквизиты и подпись Лицензиата"
    fields:

      - name: ogrn
        label: "ОГРН"
        type: text
        required: true
        word_tag: "{{OGRN}}"

      - name: inn
        label: "ИНН ИП"
        type: text
        required: true
        word_tag: "{{INN}}"

      - name: address
        label: "Место нахождения (адрес ИП)"
        type: text
        required: true
        word_tag: "{{ADDRESS}}"

      - name: ip_stamp_abbr
        label: "Обозначение печати (обычно М.П.)"
        type: text
        required: false
        default: "М.П."
        word_tag: "{{IP_STAMP_ABBR}}"
